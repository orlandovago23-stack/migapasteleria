<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito - La Buena Miga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Georgia, serif;
      background: #fdf6e3;
      padding: 20px;
      color: #4a2f1b;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .item {
      background: #fffaf0;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .total {
      font-size: 1.4rem;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }

    button {
      padding: 10px 16px;
      border: none;
      background: #d2a35c;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 20px auto;
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <h1>Tu carrito</h1>

  <div id="lista"></div>
  <p class="total" id="total"></p>

  <button id="btn-whatsapp">Enviar pedido por WhatsApp</button>

  <script src="carrito.js"></script>
</body>
</html>
